<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You Shagun ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;600&display=swap" rel="stylesheet">
<style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
        height:100vh;
        display:flex;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg, #ff9a9e, #fad0c4);
        overflow:hidden;
        font-family:'Poppins', sans-serif;
    }

    h1 {
        font-family:'Great Vibes', cursive;
        font-size:70px;
        color:white;
        text-shadow:0 0 20px rgba(255,255,255,0.8);
        animation: glow 2s infinite alternate;
    }

    @keyframes glow {
        from { text-shadow:0 0 10px #fff, 0 0 20px #ff4d6d; }
        to { text-shadow:0 0 20px #fff, 0 0 40px #ff1e56; }
    }

    .heart {
        position:absolute;
        width:20px;
        height:20px;
        background:red;
        transform:rotate(45deg);
        animation: floatUp 6s linear infinite;
    }

    .heart::before,
    .heart::after {
        content:'';
        position:absolute;
        width:20px;
        height:20px;
        background:red;
        border-radius:50%;
    }

    .heart::before { top:-10px; left:0; }
    .heart::after { left:-10px; top:0; }

    @keyframes floatUp {
        0% {
            transform:translateY(100vh) rotate(45deg);
            opacity:1;
        }
        100% {
            transform:translateY(-10vh) rotate(45deg);
            opacity:0;
        }
    }

    button {
        position:absolute;
        bottom:40px;
        padding:12px 25px;
        border:none;
        border-radius:30px;
        background:#ff4d6d;
        color:white;
        font-size:16px;
        cursor:pointer;
        transition:0.3s;
    }

    button:hover {
        background:#ff1e56;
        transform:scale(1.1);
    }
</style>
</head>
<body>

<h1 id="text">I Love You Shagun ❤️</h1>
<button onclick="nextPage()">Click for Surprise 💌</button>

<script>
// Create floating hearts
for(let i=0;i<40;i++){
    let heart=document.createElement('div');
    heart.classList.add('heart');
    heart.style.left=Math.random()*100+'vw';
    heart.style.animationDuration=(3+Math.random()*3)+'s';
    heart.style.opacity=Math.random();
    document.body.appendChild(heart);
}

function nextPage(){
    document.body.innerHTML=`
    <div style="text-align:center;color:white;">
        <h1 style="font-size:60px;font-family:'Great Vibes',cursive;">Forever & Always 💖</h1>
        <p style="font-size:22px;margin-top:20px;">You are the most special person in my life Shagun ✨</p>
        <p style="margin-top:10px;font-size:18px;">This little page is just to make you smile 😊</p>
        <button onclick="location.reload()" style="margin-top:30px;">Back ❤️</button>
    </div>`;
}
</script>

</body>
</html>
