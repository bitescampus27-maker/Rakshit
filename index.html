<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I Love You Shagun ❤️ - Mobile Magic</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes:wght@400;700&family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
    * { 
        margin:0; 
        padding:0; 
        box-sizing:border-box; 
        -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
        height:100%;
        overflow-x:hidden;
        touch-action: manipulation;
    }
    
    body {
        min-height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg, #ff6b9d 0%, #c44569 25%, #f8b500 50%, #ff9a9e 75%, #fecfef 100%);
        background-size: 400% 400%;
        animation: gradientShift 12s ease infinite;
        font-family:'Poppins', sans-serif;
        position:relative;
        text-align:center;
        padding:8px;
    }

    @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }

    /* Floating Hearts */
    .hearts {
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        pointer-events:none;
        z-index:1;
    }

    .heart-float {
        position:absolute;
        font-size:clamp(16px, 5vw, 24px);
        color:#ff4d6d;
        animation: heartFloat 6s ease-out infinite;
        text-shadow:0 0 20px rgba(255,77,109,0.9);
    }

    @keyframes heartFloat {
        0% {
            transform: translateY(100vh) scale(0);
            opacity:0;
        }
        10% { opacity:1; transform: translateY(90vh) scale(1); }
        100% { 
            transform: translateY(-50vh) translateX(50vw) scale(1.5) rotate(720deg);
            opacity:0;
        }
    }

    /* Main Content */
    .main-content {
        z-index:10;
        width:100%;
        max-width:420px;
        padding:20px 15px;
        animation: fadeInUp 1.5s ease-out;
        display:flex;
        flex-direction:column;
        align-items:center;
    }

    @keyframes fadeInUp {
        0% { opacity:0; transform:translateY(50px); }
        100% { opacity:1; transform:translateY(0); }
    }

    h1 {
        font-family:'Great Vibes', cursive;
        font-size:clamp(2.8rem, 14vw, 5rem);
        color:#fff;
        text-shadow:0 0 30px rgba(255,255,255,0.9), 0 0 60px #ff4d6d;
        margin-bottom:20px;
        animation: heartbeat 2s infinite ease-in-out;
        line-height:1.1;
        padding:0 10px;
    }

    @keyframes heartbeat {
        0%, 100% { transform:scale(1); }
        50% { transform:scale(1.05); }
    }

    .subtitle {
        font-family:'Dancing Script', cursive;
        font-size:clamp(1.3rem, 6vw, 2rem);
        color:#fff;
        margin-bottom:25px;
        text-shadow:0 0 20px rgba(255,255,255,0.8);
        padding:0 15px;
        line-height:1.4;
        animation: floatText 3s ease-in-out infinite;
    }

    @keyframes floatText {
        0%, 100% { transform:translateY(0); }
        50% { transform:translateY(-8px); }
    }

    .love-card {
        background:rgba(255,255,255,0.2);
        backdrop-filter:blur(20px);
        border-radius:25px;
        padding:25px 20px;
        margin:25px 0;
        border:1px solid rgba(255,255,255,0.3);
        box-shadow:0 25px 50px rgba(0,0,0,0.2);
        animation: cardBounce 2s ease-out;
        width:100%;
        color:#fff;
    }

    @keyframes cardBounce {
        0% { transform:scale(0.8); opacity:0; }
        60% { transform:scale(1.05); }
        100% { transform:scale(1); opacity:1; }
    }

    .love-card h2 {
        font-size:clamp(1.4rem, 5vw, 1.8rem);
        margin-bottom:15px;
        font-weight:600;
        color:#fff;
    }

    .love-card p {
        font-size:clamp(1rem, 3.5vw, 1.1rem);
        line-height:1.6;
        color:rgba(255,255,255,0.95);
        margin-bottom:10px;
    }

    .magic-btn {
        padding:18px 35px;
        border:none;
        border-radius:50px;
        background:linear-gradient(45deg, #ff4d6d, #ff1e56);
        color:#fff;
        font-size:clamp(15px, 4vw, 17px);
        font-weight:600;
        cursor:pointer;
        box-shadow:0 20px 40px rgba(255,77,109,0.4);
        margin-top:30px;
        text-transform:uppercase;
        letter-spacing:1px;
        transition:all 0.4s ease;
        width:100%;
        max-width:320px;
        font-family:'Poppins', sans-serif;
        position:relative;
        overflow:hidden;
    }

    .magic-btn:hover {
        transform:translateY(-8px) scale(1.05);
        box-shadow:0 30px 60px rgba(255,77,109,0.6);
    }

    .magic-btn:active {
        transform:translateY(-3px);
    }

    /* Surprise Page */
    .surprise-page {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
        background-size: 400% 400%;
        animation: gradientShift 10s ease infinite;
        min-height:100vh;
        padding:8px;
        color:#fff;
    }

    .surprise-content {
        width:100%;
        max-width:420px;
        padding:20px 15px;
        animation: explodeIn 1.5s ease-out;
    }

    @keyframes explodeIn {
        0% { opacity:0; transform:scale(0.5); }
        70% { transform:scale(1.1); }
        100% { opacity:1; transform:scale(1); }
    }

    .surprise-title {
        font-family:'Great Vibes', cursive;
        font-size:clamp(3.2rem, 16vw, 5.5rem);
        color:#fff;
        text-shadow:0 0 40px rgba(255,255,255,0.9), 0 0 80px #ffd700;
        margin-bottom:25px;
        animation: rainbowGlow 3s ease-in-out infinite alternate;
        line-height:1.1;
        padding:0 10px;
    }

    @keyframes rainbowGlow {
        0% { text-shadow:0 0 30px #fff, 0 0 60px #ffd700; }
        100% { text-shadow:0 0 40px #fff, 0 0 100px #ffed4a; }
    }

    .promise-subtitle {
        font-family:'Dancing Script', cursive;
        font-size:clamp(1.3rem, 6vw, 1.9rem);
        color:#fff;
        margin-bottom:30px;
        text-shadow:0 0 25px rgba(255,255,255,0.8);
        padding:0 15px;
        line-height:1.4;
    }

    .promise-grid {
        display:flex;
        flex-direction:column;
        gap:20px;
        margin:35px 0;
    }

    .promise-card {
        background:rgba(255,255,255,0.15);
        backdrop-filter:blur(20px);
        border-radius:22px;
        padding:25px 20px;
        border:1px solid rgba(255,255,255,0.3);
        transition:all 0.4s ease;
        animation: slideUp 1s ease-out forwards;
        opacity:0;
        transform:translateY(30px);
        color:#fff;
    }

    .promise-card:nth-child(1) { animation-delay:0.3s; }
