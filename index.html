
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>I Love You Shagun ❤️</title>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes:wght@400;700&family=Dancing+Script:wght@400;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
<style>
    * { 
        margin:0; 
        padding:0; 
        box-sizing:border-box; 
        -webkit-tap-highlight-color: transparent;
    }
    
    html, body {
        height:100%;
        overflow-x:hidden;
        touch-action: manipulation;
    }
    
    body {
        min-height:100vh;
        display:flex;
        flex-direction:column;
        justify-content:center;
        align-items:center;
        background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 25%, #fad0c4 50%, #ffd1ff 75%, #a8edea 100%);
        background-size: 400% 400%;
        animation: gradientShift 12s ease infinite;
        font-family:'Poppins', sans-serif;
        position:relative;
        text-align:center;
        padding:8px;
        overflow:hidden;
    }

    @keyframes gradientShift {
        0%, 100% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
    }

    /* Particle Background */
    .particles {
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        pointer-events:none;
        z-index:1;
    }

    .particle {
        position:absolute;
        border-radius:50%;
        background:radial-gradient(circle, rgba(255,255,255,0.8), transparent);
        animation: float 20s infinite linear;
    }

    @keyframes float {
        0% {
            transform: translateY(100vh) translateX(0) rotate(0deg);
            opacity:0;
        }
        10% { opacity:1; }
        90% { opacity:1; }
        100% {
            transform: translateY(-100px) translateX(100px) rotate(360deg);
            opacity:0;
        }
    }

    /* Floating Hearts */
    .hearts {
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        pointer-events:none;
        z-index:2;
    }

    .heart-float {
        position:absolute;
        font-size:clamp(12px, 4vw, 20px);
        color:#ff4d6d;
        animation: heartFloat 6s ease-out infinite;
        text-shadow:0 0 10px rgba(255,77,109,0.8);
    }

    @keyframes heartFloat {
        0% {
            transform: translateY(100vh) translateX(0) scale(0) rotate(0deg);
            opacity:0;
        }
        10% {
            opacity:1;
            transform: translateY(90vh) translateX(0) scale(1) rotate(0deg);
        }
        100% {
            transform: translateY(-20vh) translateX(50vw) scale(1.5) rotate(720deg);
            opacity:0;
        }
    }

    /* Main Content */
    .main-content {
        z-index:10;
        width:100%;
        max-width:400px;
        padding:15px 12px;
        animation: slideInFromBottom 1.2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        display:flex;
        flex-direction:column;
        align-items:center;
        position:relative;
    }

    @keyframes slideInFromBottom {
        0% {
            opacity:0;
            transform: translateY(100px) scale(0.8);
        }
        100% {
            opacity:1;
            transform: translateY(0) scale(1);
        }
    }

    .glow-ring {
        position:absolute;
        width:120%;
        height:120%;
        border:2px solid rgba(255,255,255,0.3);
        border-radius:50%;
        top:50%;
        left:50%;
        transform:translate(-50%, -50%);
        animation: pulseRing 3s infinite;
        z-index:1;
    }

    @keyframes pulseRing {
        0% { 
            transform:translate(-50%, -50%) scale(1);
            opacity:0.5;
        }
        50% { 
            transform:translate(-50%, -50%) scale(1.2);
            opacity:0.2;
        }
        100% { 
            transform:translate(-50%, -50%) scale(1);
            opacity:0.5;
        }
    }

    h1 {
        font-family:'Great Vibes', cursive;
        font-size:clamp(2.2rem, 12vw, 4rem);
        background:linear-gradient(45deg, #fff, #ffe4e1, #ffcccb);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
        text-shadow:0 0 40px rgba(255,255,255,0.9), 0 0 80px #ff4d6d;
        margin-bottom:12px;
        animation: titleGlow 2.5s ease-in-out infinite alternate;
        line-height:1.1;
        position:relative;
        z-index:3;
        padding:0 5px;
    }

    @keyframes titleGlow {
        0% { 
            text-shadow:0 0 20px rgba(255,255,255,0.8), 0 0 40px #ff4d6d, 0 0 60px #ff1e56;
            transform:scale(1);
        }
        100% { 
            text-shadow:0 0 30px rgba(255,255,255,1), 0 0 60px #ff4d6d, 0 0 100px #ff1e56;
            transform:scale(1.02);
        }
    }

    .subtitle {
        font-family:'Dancing Script', cursive;
        font-size:clamp(1.1rem, 5vw, 1.6rem);
        background:linear-gradient(45deg, rgba(255,255,255,0.95), rgba(255,255,255,0.8));
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        background-clip:text;
        margin-bottom:20px;
        text-shadow:0 2px 15px rgba(0,0,0,0.3);
        animation: subtitleFloat 3s ease-in-out infinite;
        padding:0 8px;
        line-height:1.3;
        position:relative;
        z-index:3;
    }

    @keyframes subtitleFloat {
        0%, 100% { transform:translateY(0px); }
        50% { transform:translateY(-5px); }
    }

    .love-card {
        background:linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0.1));
        backdrop-filter:blur(20px);
        border-radius:24px;
        padding:25px 20px;
        margin:20px 0;
        border:1px solid rgba(255,255,255,0.25);
        box-shadow: 
            0 25px 50px rgba(0,0,0,0.15),
            inset 0 1px 0 rgba(255,255,255,0.4);
        animation: cardFloat 4s ease-in-out infinite;
        width:100%;
        position:relative;
        overflow:hidden;
        z-index:3;
    }

    .love-card::before {
        content:'';
        position:absolute;
        top:-50%;
        left:-50%;
        width:200%;
        height:200%;
        background:linear-gradient(45deg, transparent, rgba(255,255,255,0.1), transparent);
        transform:rotate(45deg);
        animation: shine 3s infinite;
    }

    @keyframes shine {
        0% { transform:translateX(-100%) translateY(-100%) rotate(45deg); }
        100% { transform:translateX(100%) translateY(100%) rotate(45deg); }
    }

    @keyframes cardFloat {
        0%, 100% { transform:translateY(0px) rotateX(0deg); }
        50% { transform:translateY(-8px) rotateX(2deg); }
    }

    .love-card h2 {
        font-size:clamp(1.3rem, 5vw, 1.7rem);
        background:linear-gradient(45deg, #fff, #ffe4e1);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        margin-bottom:15px;
        font-weight:600;
        line-height:1.3;
    }

    .love-card p {
        color:rgba(255,255,255,0.95);
        line-height:1.6;
        font-size:clamp(0.9rem, 3.5vw, 1rem);
        margin-bottom:8px;
        font-weight:300;
    }

    /* Magic Button */
    .magic-btn {
        position:relative;
        padding:16px 32px;
        border:none;
        border-radius:50px;
        background:linear-gradient(45deg, #ff4d6d, #ff1e56, #ff4d6d);
        background-size:300% 300%;
        color:white;
        font-size:clamp(14px, 4vw, 16px);
        font-weight:600;
        cursor:pointer;
        transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        box-shadow:0 20px 40px rgba(255,77,109,0.4);
        margin-top:25px;
        text-transform:uppercase;
        letter-spacing:1px;
        width:100%;
        max-width:300px;
        overflow:hidden;
        z-index:3;
        animation: btnPulse 2s infinite;
        font-family:'Poppins', sans-serif;
    }

    @keyframes btnPulse {
        0%, 100% { box-shadow:0 20px 40px rgba(255,77,109,0.4); }
        50% { box-shadow:0 25px 50px rgba(255,77,109,0.6); }
    }

    .magic-btn:hover {
        transform:translateY(-8px) scale(1.05);
        box-shadow:0 30px 60px rgba(255,77,109,0.7);
        background-position:100% 50%;
    }

    .magic-btn:active {
        transform:translateY(-3px) scale(1.02);
    }

    .magic-btn::before {
        content:'✨';
        position:absolute;
        left:-50px;
        top:50%;
        transform:translateY(-50%);
        font-size:20px;
        animation: sparkle 2s infinite;
        transition:0.3s;
    }

    .magic-btn:hover::before {
        left:15px;
    }

    @keyframes sparkle {
        0%, 100% { transform:translateY(-50%) scale(1) rotate(0deg); opacity:1; }
        50% { transform:translateY(-50%) scale(1.5) rotate(180deg); opacity:0.7; }
    }

    /* Surprise Page - Mobile Optimized */
    .surprise-page {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 25%, #f093fb 50%, #f5576c 75%, #4facfe 100%);
        background-size: 400% 400%;
        animation: gradientShift 10s ease infinite;
        min-height:100vh;
        padding:8px;
        position:relative;
    }

    .surprise-content {
        width:100%;
        max-width:400px;
        padding:15px 12px;
        animation: explodeIn 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }

    @keyframes explodeIn {
        0% {
            opacity:0;
            transform:scale(0.3) rotate(180deg);
        }
        50% {
            transform:scale(1.2) rotate(-10deg);
        }
        100% {
            opacity:1;
            transform:scale(1) rotate(0deg);
        }
    }

    .surprise-title {
        font-family:'Great Vibes', cursive;
        font-size:clamp(2.8rem, 14vw, 4.5rem);
        background:linear-gradient(45deg, #fff, #ffd700, #ffed4a);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        text-shadow:0 0 50px rgba(255,215,0,0.8);
        margin-bottom:20px;
        line-height:1.1;
        animation: bounceGlow 2s ease-in-out infinite;
        padding:0 5px;
    }

    @keyframes bounceGlow {
        0%, 100% { 
            transform:scale(1);
            text-shadow:0 0 30px rgba(255,215,0,0.6);
        }
        50% { 
            transform:scale(1.05);
            text-shadow:0 0 60px rgba(255,215,0,1);
        }
    }

    .promise-subtitle {
        font-family:'Dancing Script', cursive;
        font-size:clamp(1.1rem, 5vw, 1.5rem);
        color:rgba(255,255,255,0.98);
        margin-bottom:25px;
        text-shadow:0 0 25px rgba(255,255,255,0.8);
        padding:0 8px;
        line-height:1.4;
        animation: fadeInUpMobile 1s ease-out 0.3s both;
    }

    @keyframes fadeInUpMobile {
        from { opacity:0; transform:translateY(30px); }
        to { opacity:1; transform:translateY(0); }
    }

    .promise-grid {
        display:flex;
        flex-direction:column;
        gap:15px;
        margin:25px 0;
        width:100%;
    }

    .promise-card {
        background:linear-gradient(145deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05));
        backdrop-filter:blur(25px);
        border-radius:20px;
        padding:22px 18px;
        border:1px solid rgba(255,255,255,0.3);
        transition:all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        position:relative;
        overflow:hidden;
        animation: staggerIn 0.8s ease-out forwards;
        opacity:0;
    }

    .promise-card:nth-child(1) { animation-delay:0.4s; }
    .promise-card:nth-child(2) { animation-delay:0.6s; }
    .promise-card:nth-child(3) { animation-delay:0.8s; }
    .promise-card:nth-child(4) { animation-delay:1s; }

    @keyframes staggerIn {
        to {
            opacity:1;
            transform:translateY(0) scale(1);
        }
    }

    .promise-card:hover {
        transform:translateY(-12px) scale(1.02);
        box-shadow:0 30px 60px rgba(0,0,0,0.25);
        border-color:rgba(255,255,255,0.5);
    }

    .promise-icon {
        font-size:clamp(1.6rem, 6vw, 2.2rem);
        background:linear-gradient(45deg, #ffd700, #ffed4a);
        -webkit-background-clip:text;
        -webkit-text-fill-color:transparent;
        margin-bottom:12px;
        animation: iconSpin 3s linear infinite;
    }

    @keyframes iconSpin {
        0% { transform:rotate(0deg); }
        100% { transform:rotate(360deg); }
    }

    .promise-title {
        font-size:clamp(1rem, 4vw, 1.2rem);
        color:#fff;
        font-weight:600;
        margin-bottom:10px;
        line-height:1.3;
    }

    .promise-text {
        color:rgba(255,255,255,0.92);
        font-size:clamp(0.85rem, 3.2vw, 0.95rem);
        line-height:1.5;
        font-weight:300;
    }

    .final-heart {
        font-size:clamp(2rem, 8vw, 3rem);
        color:#ff4d6d;
        text-shadow:0 0 30px rgba(255,77,109,0.8);
        margin:25px 0;
        animation: heartbeatFinal 1.5s infinite;
    }

    @keyframes heartbeatFinal {
        0%, 100% { transform:scale(1); }
        50% { transform:scale(1.3); }
    }

    .back-btn {
        margin-top:30px;
        width:100%;
        max-width:280px;
    }

    /* Ultra Mobile */
    @media (max-width: 375px) {
        body { padding:5px; }
        .main-content, .surprise-content { padding:12px 8px; }
        .love-card, .promise-card { padding:20px 15px; margin:15px 0; }
    }

    /* Landscape */
    @media (max-height: 500px) and (orientation: landscape) {
        body { justify-content:flex-start; padding-top:20px; }
        .main-content { padding:10px; max-width:90vw; }
        h1 { font-size:clamp(1.8rem, 8vw, 2.5rem) !important; }
        .subtitle, .promise-subtitle { font-size:clamp(1rem, 4vw, 1.2rem) !important; }
        .promise-grid {
